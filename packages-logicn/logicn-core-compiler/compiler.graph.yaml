# LogicN Compiler Architecture Graph (Bootstrap Scaffold)
#
# This static description of the compiler's own architecture is the
# foundation for deterministic self-host verification (Phase 14).
#
# Stage B will emit a SemanticGraph of itself and compare against this.
# Once stable, the self-generated CompilerGraph becomes canonical.
#
# Decision: logicn-phase-13-decisions.md Decision 3

schema_version: "1.0"

compiler:
  name: logicn-core-compiler
  stage: A  # TypeScript bootstrap; Stage B will be LogicN-self-hosted
  version: "0.1.0-beta.0"

  phases:
    - id: lexer
      description: "Tokenise LogicN source text"
      input: "source: String"
      output: "Token[]"
      file: "src/lexer.ts"

    - id: parser
      description: "Build AST from token stream"
      input: "Token[]"
      output: "AstNode (program)"
      file: "src/parser.ts"

    - id: symbol_resolver
      description: "Resolve names and build symbol scopes"
      input: "AstNode"
      output: "SymbolResolveResult"
      file: "src/symbol-resolver.ts"

    - id: import_resolver
      description: "Resolve import declarations to known module types"
      input: "AstNode"
      output: "ImportResolveResult"
      file: "src/import-resolver.ts"

    - id: type_checker
      description: "Check type correctness (LLN-TYPE-001..022)"
      input: "AstNode"
      output: "TypeCheckResult"
      file: "src/type-checker.ts"

    - id: value_state_checker
      description: "Check value-state correctness (LLN-VALUESTATE-*, LLN-SECRET-*)"
      input: "AstNode"
      output: "ValueStateCheckResult"
      file: "src/value-state-checker.ts"

    - id: effect_checker
      description: "Check effect declarations (LLN-EFFECT-001..004)"
      input: "AstNode + FlowMeta[]"
      output: "EffectCheckResult[]"
      file: "src/effect-checker.ts"

    - id: event_checker
      description: "Check event declarations (LLN-EVENT-001..002)"
      input: "AstNode"
      output: "EventCheckResult"
      file: "src/event-checker.ts"

    - id: governance_verifier
      description: "Verify governance, contracts, response.denies (LLN-GOV-*)"
      input: "AstNode + FlowMeta[] + EffectCheckResult[]"
      output: "GovernanceVerifyResult"
      file: "src/governance-verifier.ts"

    - id: gir_emitter
      description: "Emit Governed Intermediate Representation"
      input: "AstNode + FlowMeta[]"
      output: "GIRProgram"
      file: "src/gir-emitter.ts"

    - id: interpreter
      description: "Execute GIR/AST on the Node.js runtime (Stage A)"
      input: "AstNode + FlowMeta[]"
      output: "FlowExecutionResult"
      file: "src/interpreter.ts"

    - id: runtime
      description: "Orchestrate full compiler pipeline"
      input: "source: String + RuntimeOptions"
      output: "RuntimeResult"
      file: "src/runtime.ts"

  edges:
    - { from: lexer,              to: parser            }
    - { from: parser,             to: symbol_resolver   }
    - { from: parser,             to: import_resolver   }
    - { from: parser,             to: type_checker      }
    - { from: parser,             to: value_state_checker }
    - { from: parser,             to: effect_checker    }
    - { from: parser,             to: event_checker     }
    - { from: effect_checker,     to: governance_verifier }
    - { from: governance_verifier,to: gir_emitter       }
    - { from: gir_emitter,        to: interpreter       }
    - { from: interpreter,        to: runtime           }

  runtime_layer:
    - id: contract_enforcer
      description: "Enforce timeouts, retries, limits from flow contracts"
      file: "src/runtime/contractEnforcer.ts"

    - id: capability_host
      description: "Route all side-effects through capability checks"
      file: "src/runtime/capabilityHost.ts"

    - id: governed_memory
      description: "Track protected/redacted value metadata (Phase 11D)"
      file: "src/runtime/governedMemory.ts"

    - id: runtime_report
      description: "Record contract enforcement evidence"
      file: "src/runtime/runtimeReport.ts"
