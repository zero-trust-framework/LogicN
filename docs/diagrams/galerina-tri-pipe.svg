<svg width="100%" viewBox="0 0 720 712" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina Tri-Pipe — Binary / Hybrid / Photonic fault-tolerant execution pipe</title>
<desc>The ExecutionRouter resolves one decision across three axes (capability tier, precision technique, per-kernel offload) and dispatches each eligible kernel to one of three lanes. Binary is the fail-closed digital core and universal floor (crypto, governance, K3, admission and secrets are Binary-only by invariant). Hybrid offloads only net-win kernels whose result is Freivalds cheap-verified, declining to the exact digital value on any drift. Photonic is an emulated, degrade-only co-processor lane (perf projected, not measured on silicon) — never a key. Cross-cutting K3 fail-safe dead-zone and fail-closed containment shown in purple.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="40" y="28" font-size="16" font-weight="700" fill="#1c2128">Galerina Tri-Pipe — Binary / Hybrid / Photonic fault-tolerant execution</text>
<text x="40" y="47" font-size="11" fill="#5a6470">teal = runtime · amber = governed offload · purple = K3 / fail-closed invariant · red = degrade / deny · worst case == Binary == today</text>

