<text x="164" y="498" text-anchor="middle" font-size="9.5" fill="#9b2d20">crypto · governance · K3 · admission</text>
<text x="164" y="511" text-anchor="middle" font-size="9.5" fill="#9b2d20">secrets · exact arithmetic — the precision wall</text>

