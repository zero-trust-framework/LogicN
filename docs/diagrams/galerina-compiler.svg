<svg width="100%" viewBox="0 0 720 760" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina Stage-A compiler pipeline + Deterministic-Foresight intelligence layer</title>
<desc>.fungi source flows top-down through ten compile-time passes — lexer (FUNGI-LEX), parser (AST flow/contract/match), symbol resolver (FUNGI-NAME), type checker (FUNGI-TYPE), value-state checker (SECRET/TAINT/GATE), effect checker (deny-by-default FUNGI-EFFECT), governance verifier (Kleene-K3, FUNGI-GOV, ProofGraph), GIR emitter, WAT emitter, to WASM/bytecode targets. Overlaid on the right is the Deterministic-Foresight intelligence layer from R&amp;D Document 005: (a) static K3 abstract interpretation driving Governance Dead-Code Elimination of provably-DENY branches into a static TRAP+ERASE — marked NET-NEW design, not yet shipped; (b) Tri-Pipe substrate routing R(o) choosing Binary, Hybrid or Photonic per kernel with crypto pinned Binary — shipped; (c) semantic auto-resilience injecting the K3 0-holding state on network calls — shipped via resilience-inference. Cross-cutting fail-closed K3 and FUNGI diagnostic codes hold across every pass: INDETERMINATE resolves to deny, never silent.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="40" y="28" font-size="16" font-weight="700" fill="#1c2128">Galerina Stage-A compiler + Deterministic-Foresight intelligence</text>
<text x="40" y="47" font-size="11" fill="#5a6470">blue = compile-time pass · teal = emit/target · amber = substrate routing · purple = static foresight / invariant · red = fail-closed</text>

<!-- ================= COMPILE-TIME PIPELINE (left column) ================= -->
<text x="40" y="72" font-size="11" fill="#5a6470">Compile-time pipeline — ten passes, top-down (README §Architecture · compiler pipeline)</text>

<!-- 1 source -->
<rect x="40" y="80" width="300" height="46" rx="8" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.5"/>
<text x="190" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#1f3a6b">.fungi source — flow + contract + match</text>
<text x="190" y="117" text-anchor="middle" font-size="10.5" fill="#3a5285">intent · effects · privacy · substrate</text>
<path d="M190 126 L190 140" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 2 lexer -->
<rect x="40" y="142" width="300" height="44" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="162" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Lexer — tokenise</text>
<text x="190" y="178" text-anchor="middle" font-size="10.5" fill="#3a5285">FUNGI-LEX-001..006</text>
<path d="M190 186 L190 200" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 3 parser -->
<rect x="40" y="202" width="300" height="44" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="222" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Parser → AST</text>
<text x="190" y="238" text-anchor="middle" font-size="10.5" fill="#3a5285">flow · contract · match · record · for · import</text>
<path d="M190 246 L190 260" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 4 symbol resolver -->
<rect x="40" y="262" width="300" height="44" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="282" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Symbol resolver</text>
<text x="190" y="298" text-anchor="middle" font-size="10.5" fill="#3a5285">FUNGI-NAME-001..003</text>
<path d="M190 306 L190 320" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 5 type checker -->
<rect x="40" y="322" width="300" height="44" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="342" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Type checker</text>
<text x="190" y="358" text-anchor="middle" font-size="10.5" fill="#3a5285">FUNGI-TYPE-001..023 · ~90%</text>
<path d="M190 366 L190 380" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 6 value-state checker -->
<rect x="40" y="382" width="300" height="44" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="402" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Value-state checker</text>
<text x="190" y="418" text-anchor="middle" font-size="10.5" fill="#3a5285">SECRET · TAINT · GATE (FUNGI-VALUESTATE)</text>
<path d="M190 426 L190 440" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 7 effect checker -->
<rect x="40" y="442" width="300" height="44" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="462" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Effect checker — deny-by-default</text>
<text x="190" y="478" text-anchor="middle" font-size="10.5" fill="#3a5285">FUNGI-EFFECT-001..005</text>
<path d="M190 486 L190 500" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 8 governance verifier -->
<rect x="40" y="502" width="300" height="50" rx="8" fill="#eef3fc" stroke="#5b85dd" stroke-width="1.5"/>
<text x="190" y="522" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1f3a6b">Governance verifier — K3 + ProofGraph</text>
<text x="190" y="538" text-anchor="middle" font-size="10.5" fill="#3a5285">FUNGI-GOV-001..020 · FUNGI-TERM-001 · verifySubstrate</text>
<path d="M190 552 L190 566" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- 9 GIR emitter -->
