<text x="113" y="588" text-anchor="middle" font-size="12.5" font-weight="600" fill="#16544c">GIR emitter</text>
<text x="113" y="604" text-anchor="middle" font-size="10" fill="#1f6b60">Governed IR → Stage-B</text>

<!-- 10 WAT emitter -->
<rect x="194" y="568" width="146" height="48" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="267" y="588" text-anchor="middle" font-size="12.5" font-weight="600" fill="#16544c">WAT emitter</text>
<text x="267" y="604" text-anchor="middle" font-size="10" fill="#1f6b60">~89% · trap-on-unhandled</text>

<path d="M113 616 L113 632" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M267 616 L267 632" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- target -->
<rect x="40" y="634" width="300" height="46" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="190" y="655" text-anchor="middle" font-size="13" font-weight="600" fill="#16544c">WASM / bytecode targets</text>
<text x="190" y="671" text-anchor="middle" font-size="10.5" fill="#1f6b60">WASM = production path · tiered runtime + tree-walker oracle</text>

<!-- ================= INTELLIGENCE LAYER (right column) ================= -->
<text x="372" y="72" font-size="11" fill="#5a6470">Deterministic-Foresight intelligence (R&amp;D Doc 005) — proof, not guessing</text>
<rect x="372" y="80" width="308" height="476" rx="10" fill="#f7f4fd" stroke="#7c5cd0" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="526" y="101" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3f2d73">Static K3 mathematical foresight</text>
<text x="526" y="116" text-anchor="middle" font-size="10" fill="#52408f">runs across the pass column — verdict V = {−1, 0, +1}</text>

<!-- (a) abstract interpretation + DCE — NET-NEW -->
<rect x="388" y="128" width="276" height="118" rx="8" fill="#efe9fb" stroke="#7c5cd0" stroke-width="1.5"/>
<text x="526" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#3f2d73">(a) K3 abstract interpretation</text>
<text x="526" y="163" text-anchor="middle" font-size="10" fill="#52408f">per-variable trust over the DAG · vAnd = min</text>
<rect x="402" y="172" width="248" height="30" rx="6" fill="#f6f2fe" stroke="#9277d9" stroke-width="1.5"/>
<text x="526" y="191" text-anchor="middle" font-size="10.5" fill="#3f2d73">min(+1 pinned, −1 revoked) = −1 proven</text>
<rect x="402" y="206" width="248" height="32" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
<text x="526" y="221" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9b2d20">Governance Dead-Code Elimination</text>
<text x="526" y="233" text-anchor="middle" font-size="9.5" fill="#9b2d20">provably-DENY branch → static TRAP + ERASE</text>
<text x="650" y="142" text-anchor="end" font-size="9" font-weight="700" fill="#c0392b">NET-NEW</text>

<!-- (b) Tri-Pipe routing — SHIPPED -->
<rect x="388" y="256" width="276" height="118" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="1.5"/>
