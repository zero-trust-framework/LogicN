<text x="526" y="291" text-anchor="middle" font-size="10" fill="#7a5a1c">execution-router · PartitionDecider · per kernel</text>
<rect x="402" y="300" width="78" height="34" rx="6" fill="#fdf8ec" stroke="#d8a23e" stroke-width="1.5"/>
<text x="441" y="317" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b4a12">Binary</text>
<text x="441" y="329" text-anchor="middle" font-size="8.5" fill="#7a5a1c">default floor</text>
<rect x="487" y="300" width="78" height="34" rx="6" fill="#fdf8ec" stroke="#d8a23e" stroke-width="1.5"/>
<text x="526" y="317" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b4a12">Hybrid</text>
<text x="526" y="329" text-anchor="middle" font-size="8.5" fill="#7a5a1c">net-win only</text>
<rect x="572" y="300" width="78" height="34" rx="6" fill="#fdf8ec" stroke="#d8a23e" stroke-width="1.5" stroke-dasharray="4 3"/>
<text x="611" y="317" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6b4a12">Photonic</text>
<text x="611" y="329" text-anchor="middle" font-size="8.5" fill="#c0392b">emulated</text>
<rect x="402" y="338" width="248" height="28" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
<text x="526" y="356" text-anchor="middle" font-size="10" font-weight="600" fill="#9b2d20">crypto pinned Binary · S_P→S_B key = FUNGI-SUBSTRATE-001</text>
<text x="650" y="270" text-anchor="end" font-size="9" font-weight="700" fill="#2f9e8f">SHIPPED</text>

<!-- (c) semantic auto-resilience — SHIPPED -->
<rect x="388" y="384" width="276" height="100" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="1.5"/>
<text x="526" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#6b4a12">(c) Semantic auto-resilience</text>
<text x="526" y="419" text-anchor="middle" font-size="10" fill="#7a5a1c">resilience-inference injects the 0-holding state</text>
<rect x="402" y="428" width="248" height="48" rx="6" fill="#fdf8ec" stroke="#d8a23e" stroke-width="1.5"/>
<text x="526" y="445" text-anchor="middle" font-size="10" fill="#6b4a12">db.fetch → ternary state machine:</text>
<text x="526" y="459" text-anchor="middle" font-size="9.5" fill="#7a5a1c">+1 verified · 0 noise → hold/repair · −1 invalid → TRAP</text>
<text x="526" y="471" text-anchor="middle" font-size="9" fill="#7a5a1c">on_*_fault handler parsing still partial (◑)</text>
<text x="650" y="398" text-anchor="end" font-size="9" font-weight="700" fill="#2f9e8f">SHIPPED</text>

<!-- caveat inside band -->
<text x="526" y="502" text-anchor="middle" font-size="9.5" fill="#52408f" font-style="italic">~70–80% of the blueprint re-derives shipped code;</text>
<text x="526" y="516" text-anchor="middle" font-size="9.5" fill="#52408f" font-style="italic">(a) Governance DCE is the genuine net-new pass.</text>
<text x="526" y="536" text-anchor="middle" font-size="9.5" fill="#9b2d20">Photonic perf projected/emulated, not measured on silicon.</text>
<text x="526" y="550" text-anchor="middle" font-size="9.5" fill="#9b2d20">Real DSS.wasm enforcement is a stub (Stage-A simulation).</text>

