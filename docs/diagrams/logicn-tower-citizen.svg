<svg width="100%" viewBox="0 0 720 690" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>LogicN Tower Citizen — the Unified Hybrid Inference Engine ("the Brain")</title>
<desc>A governed inference pass: a request enters the InferenceBridge contract (Brain/Brawn FFI seam), the precision router picks BitNet ternary, NVFP4, Groq-scheduled or the fp16 deny-floor per operation, the TPL ternary VPP runs BitNet-faithful add/sub/skip T-MAC, all under a fail-closed K3 three-valued governance gate and a Load to Execute to Erase lifecycle, with the substrate NMR tolerance model. Compute is teal, governance is amber and purple, fail-closed accents are red. Photonic linear-ternary execution is emulated in Stage-A software, not silicon.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="28" font-size="16" font-weight="700" fill="#1c2128">LogicN Tower Citizen — the Unified Hybrid Inference Engine ("the Brain")</text>
<text x="40" y="48" font-size="11" fill="#5a6470">teal = compute · amber = governance contract · purple = cross-cutting invariant / K3 · blue = routing decision · red = fail-closed</text>

<!-- ① Input: governed request -->
<rect x="200" y="64" width="320" height="48" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="1.5"/>
<text x="360" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#6b4a12">① InferenceBridge request + ai {} contract</text>
<text x="360" y="102" text-anchor="middle" font-size="10.5" fill="#7d5e1d">prompt · correlationId · approved_models · token / cost budgets</text>
<path d="M360 112 L360 130" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- ② K3 admission gate (Hold-First) -->
<rect x="150" y="132" width="420" height="52" rx="8" fill="#efe9fb" stroke="#7c5cd0" stroke-width="1.5"/>
<text x="360" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#3f2d73">② K3 governance gate — decideAtBoundary (Hold-First)</text>
<text x="360" y="171" text-anchor="middle" font-size="10.5" fill="#52408f">vAnd / allOf over verdicts · +1 allow · −1 deny · 0 INDETERMINATE → deny</text>
<text x="582" y="150" font-size="10" font-weight="700" fill="#c0392b">fail-</text>
<text x="582" y="163" font-size="10" font-weight="700" fill="#c0392b">closed</text>
<path d="M360 184 L360 202" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- ③ Precision router -->
<rect x="150" y="204" width="420" height="52" rx="8" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.5"/>
<text x="360" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#1f3a6b">③ Precision router — routePrecision (per-operation)</text>
<text x="360" y="243" text-anchor="middle" font-size="10.5" fill="#3a5285">OP_SENSITIVITY table · governanceTier · airGapped · substrate tolerance</text>

<!-- routing fan-out to four lanes -->
<path d="M230 256 L185 286" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M315 256 L320 286" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M405 256 L500 286" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M490 256 L640 286" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- four precision lanes -->
<rect x="40" y="288" width="148" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="114" y="309" text-anchor="middle" font-size="12" font-weight="600" fill="#16544c">BitNet ternary</text>
<text x="114" y="325" text-anchor="middle" font-size="10" fill="#1f6b60">{−1,0,+1} · 1.58-bit</text>
<text x="114" y="340" text-anchor="middle" font-size="10" fill="#1f6b60">CPU / air-gapped lane</text>

<rect x="200" y="288" width="148" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="274" y="309" text-anchor="middle" font-size="12" font-weight="600" fill="#16544c">NVFP4 block</text>
<text x="274" y="325" text-anchor="middle" font-size="10" fill="#1f6b60">E2M1 · 16-elem scale</text>
<text x="274" y="340" text-anchor="middle" font-size="10" fill="#1f6b60">Blackwell-bound · KV/attn</text>

<rect x="360" y="288" width="148" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="434" y="309" text-anchor="middle" font-size="12" font-weight="600" fill="#16544c">Groq static</text>
<text x="434" y="325" text-anchor="middle" font-size="10" fill="#1f6b60">scheduling axis</text>
<text x="434" y="340" text-anchor="middle" font-size="10" fill="#1f6b60">latency-bound invariant</text>

<rect x="520" y="288" width="160" height="64" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
<text x="600" y="309" text-anchor="middle" font-size="12" font-weight="600" fill="#a4302480">fp16 deny-floor</text>
<text x="600" y="309" text-anchor="middle" font-size="12" font-weight="600" fill="#a43024">fp16 deny-floor</text>
<text x="600" y="325" text-anchor="middle" font-size="10" fill="#8c2c20">sensitivity ≥ 0.85</text>
<text x="600" y="340" text-anchor="middle" font-size="10" fill="#8c2c20">+ unknown op (deny-default)</text>

<!-- lanes converge into the bridge -->
<path d="M114 352 L300 392" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M274 352 L345 392" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M434 352 L380 392" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M600 352 L420 392" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- ④ InferenceBridge FFI seam -->
<rect x="150" y="394" width="420" height="50" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="1.5"/>
<text x="360" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#6b4a12">④ InferenceBridge — Brain/Brawn FFI seam (assertDeterminism)</text>
<text x="360" y="432" text-anchor="middle" font-size="10.5" fill="#7d5e1d">attested kernels · stub providers ship today (StubTernaryBridge / StubFp4Bridge)</text>
<path d="M360 444 L360 462" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- ⑤ TPL ternary VPP -->
<rect x="40" y="464" width="430" height="92" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="255" y="485" text-anchor="middle" font-size="13" font-weight="600" fill="#16544c">⑤ TPL ternary VPP — tpl-simulator (BitNet I2_S faithful)</text>
<text x="255" y="503" text-anchor="middle" font-size="10.5" fill="#1f6b60">2-bit pack 00=−1 · 01=0 · 10=+1 · 11=ILLEGAL → integrity fault</text>
<text x="255" y="519" text-anchor="middle" font-size="10.5" fill="#1f6b60">T-MAC = add / subtract / skip · associative · no multiply · ×i2_scale</text>
<text x="255" y="535" text-anchor="middle" font-size="10.5" fill="#1f6b60">guard-page canaries · Epistemic-Hold gate on 0 → +1 transition</text>
<text x="255" y="551" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5a6470">photonic linear-ternary substrate = emulated in software, not silicon (projected)</text>

<!-- substrate model beside the VPP -->
<rect x="482" y="464" width="198" height="92" rx="8" fill="#efe9fb" stroke="#7c5cd0" stroke-width="1.5"/>
<text x="581" y="485" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3f2d73">substrate-model</text>
<text x="581" y="503" text-anchor="middle" font-size="10" fill="#52408f">NMR tolerance (von Neumann)</text>
<text x="581" y="519" text-anchor="middle" font-size="10" fill="#52408f">phase-drift / crosstalk noise</text>
<text x="581" y="535" text-anchor="middle" font-size="10" fill="#52408f">effectiveVerdict =</text>
<text x="581" y="550" text-anchor="middle" font-size="10" fill="#52408f">vAnd(ideal, reading)</text>
<!-- substrate feeds the K3 verdict (noise costs availability, not safety) -->
<path d="M581 464 L581 200 L570 200" fill="none" stroke="#a99bd6" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text x="600" y="262" font-size="9" fill="#7c5cd0">noise → 0,</text>
<text x="600" y="274" font-size="9" fill="#7c5cd0">never unsafe</text>

<path d="M255 556 L255 574" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- ⑥ Output: audited receipt + erase -->
<rect x="40" y="576" width="430" height="50" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="1.5"/>
<text x="255" y="597" text-anchor="middle" font-size="13" font-weight="600" fill="#6b4a12">⑥ HybridInferenceReceipt — per-op precision proof</text>
<text x="255" y="614" text-anchor="middle" font-size="10.5" fill="#7d5e1d">AuditEvent ledger: which precision ran which op · enginesBlended · avgBits</text>

<!-- Erase step closing the lifecycle -->
<rect x="482" y="576" width="198" height="50" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
<text x="581" y="597" text-anchor="middle" font-size="12.5" font-weight="600" fill="#a43024">ERASE — hard wipe</text>
<text x="581" y="614" text-anchor="middle" font-size="10" fill="#8c2c20">atomic buffer zero · stateless</text>
<path d="M470 601 L482 601" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- lifecycle spine label -->
<text x="40" y="652" font-size="11" font-weight="700" fill="#6b4a12">Governed lifecycle:</text>
<text x="145" y="652" font-size="11" fill="#5a6470">LOAD (hash + correlationId bound) → EXECUTE (routed kernels) → ERASE — Stage-A TS interpreter; real DSS.wasm supervisor is a stub.</text>
</svg>
