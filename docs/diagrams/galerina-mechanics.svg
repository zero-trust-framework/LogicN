<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina mechanics — governance-first compute pipeline</title>
<desc>Author .fungi source, compile through the Stage-A governance verifier, sign artifacts, run under a fail-closed K3 gate, with governed ext packages, all under the crypto-on-core invariant.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="40" y="26" font-size="16" font-weight="700" fill="#1c2128">Galerina mechanics — governance-first compute</text>
<text x="40" y="46" font-size="11" fill="#5a6470">blue = compile-time · teal = runtime · amber = governed ext · purple = cross-cutting invariant</text>

<rect x="140" y="62" width="400" height="48" rx="8" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.5"/>
