<text x="135" y="374" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b4e15">.tmf engine</text>
<text x="135" y="391" text-anchor="middle" font-size="10" fill="#7d5e1d">TMX-256 · container · KEM-DEM</text>
<rect x="245" y="349" width="190" height="52" rx="8" fill="#fcf0d9" stroke="#c08a2e" stroke-width="1.5"/>
<text x="340" y="374" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b4e15">Quantum bridge</text>
<text x="340" y="391" text-anchor="middle" font-size="10" fill="#7d5e1d">Tier-3 · attested</text>
<rect x="450" y="349" width="190" height="52" rx="8" fill="#fcf0d9" stroke="#c08a2e" stroke-width="1.5"/>
<text x="545" y="374" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b4e15">Secrets vault</text>
<text x="545" y="391" text-anchor="middle" font-size="10" fill="#7d5e1d">sealed credentials</text>

<rect x="40" y="421" width="600" height="48" rx="8" fill="#f3eefa" stroke="#7a5bb0" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="340" y="443" text-anchor="middle" font-size="12.5" font-weight="600" fill="#43306b">Cross-cutting invariant — crypto-on-core (FUNGI-SUBSTRATE-001)</text>
<text x="340" y="460" text-anchor="middle" font-size="10.5" fill="#5a4584">digital bit-exact crypto · photonics = bulk math only · substrate tolerance (NMR/TMR)</text>
