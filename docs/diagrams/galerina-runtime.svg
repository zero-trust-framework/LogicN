<svg width="100%" viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina runtime — the tiered governed runtime</title>
<desc>The Governed IR (GIR) enters a tiered execution engine — cache, bytecode VM, sync, WASM (the production path), and the tree-walker (a slow diagnostic / WASM byte-parity oracle). Governance is compiled in at every tier: a fail-closed K3 gate, contracts, and an audit tap. Execution produces a RunResult (return value plus audit log), which is sealed into a signed ProofGraph and .lmanifest. The DSS supervisory tier is honestly marked as a Stage-A TypeScript simulation; the real DSS.wasm component is Post-P9 (issues #102 to 106).</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="40" y="28" font-size="16" font-weight="700" fill="#1c2128">Galerina runtime — the tiered governed runtime</text>
<text x="40" y="47" font-size="11" fill="#5a6470">blue = compile-time IR · teal = runtime tier · amber = production path · purple = compiled-in governance · red = fail-closed</text>

<!-- INPUT: GIR -->
<rect x="200" y="64" width="320" height="50" rx="8" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.5"/>
<text x="360" y="86" text-anchor="middle" font-size="13" font-weight="600" fill="#1f3a6b">GIR — Governed Intermediate Representation</text>
<text x="360" y="103" text-anchor="middle" font-size="10.5" fill="#3a5285">from Stage-A: effects · contracts · K3 proofs baked in</text>
<path d="M360 114 L360 132" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- GOVERNANCE BAR (compiled-in, spans the tier row) -->
<rect x="40" y="134" width="640" height="40" rx="8" fill="#efe9fb" stroke="#7c5cd0" stroke-width="1.5"/>
<text x="360" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#3f2d73">Governance is compiled in — applied at every tier, not wrapped around it</text>
<text x="360" y="167" text-anchor="middle" font-size="10.5" fill="#54429a">K3 gate (allow +1 · deny −1 · unknown 0 → deny) · contract checks · audit tap · FUNGI-GOV-001..020</text>
<path d="M360 174 L360 192" fill="none" stroke="#7c5cd0" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- TIER ROW LABEL -->
<text x="40" y="208" font-size="11" fill="#5a6470">Tiered execution engine — each tier passes through the same K3 gate + audit tap</text>

<!-- TIER BOXES -->
<rect x="40" y="216" width="120" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="100" y="240" text-anchor="middle" font-size="12.5" font-weight="600" fill="#16544c">Cache</text>
<text x="100" y="256" text-anchor="middle" font-size="10" fill="#1f6b60">verified fast path</text>
<text x="100" y="270" text-anchor="middle" font-size="10" fill="#1f6b60">leased · invalidated</text>

<rect x="172" y="216" width="120" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="232" y="240" text-anchor="middle" font-size="12.5" font-weight="600" fill="#16544c">Bytecode VM</text>
<text x="232" y="256" text-anchor="middle" font-size="10" fill="#1f6b60">linear-IR</text>
<text x="232" y="270" text-anchor="middle" font-size="10" fill="#1f6b60">dispatch</text>

<rect x="304" y="216" width="120" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="364" y="240" text-anchor="middle" font-size="12.5" font-weight="600" fill="#16544c">Sync</text>
<text x="364" y="256" text-anchor="middle" font-size="10" fill="#1f6b60">direct eval</text>
<text x="364" y="270" text-anchor="middle" font-size="10" fill="#1f6b60">small flows</text>

<!-- WASM = production path (amber, emphasised) -->
<rect x="436" y="212" width="120" height="72" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="2.2"/>
<text x="496" y="236" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6b4a12">WASM</text>
<text x="496" y="251" text-anchor="middle" font-size="9.5" font-weight="600" fill="#8a6516">★ PRODUCTION PATH</text>
<text x="496" y="265" text-anchor="middle" font-size="10" fill="#7a5a14">native-class speed</text>
<text x="496" y="278" text-anchor="middle" font-size="10" fill="#7a5a14">WAT emitter ~89%</text>

<!-- tree-walker = diagnostic oracle -->
<rect x="568" y="216" width="112" height="64" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5" stroke-dasharray="5 4"/>
<text x="624" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#16544c">Tree-walker</text>
<text x="624" y="253" text-anchor="middle" font-size="9.5" fill="#1f6b60">diagnostic tier</text>
<text x="624" y="266" text-anchor="middle" font-size="9.5" fill="#1f6b60">byte-parity oracle</text>
<text x="624" y="278" text-anchor="middle" font-size="9" fill="#b06a18">slowest · by design</text>

<!-- parity link between WASM and tree-walker -->
<path d="M568 248 L556 248" fill="none" stroke="#2f9e8f" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="540" y="300" text-anchor="middle" font-size="9" fill="#2f9e8f">Stage-A == WASM byte-parity (R6 corpus)</text>

<!-- arrows from tiers down to RunResult -->
<path d="M100 280 L100 300 Q100 318 130 318 L300 318" fill="none" stroke="#8a94a3" stroke-width="1.6"/>
<path d="M232 280 L232 300 Q232 318 262 318 L300 318" fill="none" stroke="#8a94a3" stroke-width="1.6"/>
<path d="M364 284 L364 312" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>
<path d="M496 284 L496 300 Q496 318 466 318 L428 318" fill="none" stroke="#c98a1b" stroke-width="1.8"/>

<!-- RunResult -->
<rect x="200" y="330" width="320" height="56" rx="8" fill="#e2f5f1" stroke="#2f9e8f" stroke-width="1.5"/>
<text x="360" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#16544c">RunResult — Layer 4 observable output</text>
<text x="360" y="372" text-anchor="middle" font-size="10.5" fill="#1f6b60">retVal (return value) + auditLog (every governed effect)</text>
<path d="M360 386 L360 404" fill="none" stroke="#8a94a3" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- ProofGraph + .lmanifest -->
<rect x="120" y="406" width="480" height="56" rx="8" fill="#efe9fb" stroke="#7c5cd0" stroke-width="1.5"/>
<text x="360" y="430" text-anchor="middle" font-size="13" font-weight="600" fill="#3f2d73">ProofGraph + .lmanifest — Layer 5 cryptographic audit proof</text>
<text x="360" y="448" text-anchor="middle" font-size="10.5" fill="#54429a">signed Ed25519 · hybrid ML-DSA-65 on attestation / bridge · verified before load</text>

<!-- fail-closed note (red, left) -->
<rect x="40" y="406" width="68" height="56" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
<text x="74" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">FAIL-</text>
<text x="74" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">CLOSED</text>
<text x="74" y="456" text-anchor="middle" font-size="8.5" fill="#a5342a">trap → halt</text>

<!-- DSS supervisory tier — honest aspirational marker -->
<rect x="40" y="480" width="640" height="60" rx="8" fill="#fbf2dd" stroke="#c98a1b" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="360" y="502" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b4a12">DSS Governed Tower — supervises the WASM tier (V_DPM bitmask · structured AuditEvent · clean rollback)</text>
<text x="360" y="520" text-anchor="middle" font-size="10.5" fill="#8a6516">ASPIRATIONAL: today runs as a Stage-A TypeScript simulation</text>
<text x="360" y="534" text-anchor="middle" font-size="10.5" fill="#8a6516">real DSS.wasm component is Post-P9 (#102–106) · photonic targets are emulated/projected, not silicon</text>
</svg>
