<svg width="100%" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Galerina full stack — authoring to low-level substrate, governance-first</title>
<desc>The whole Galerina stack top to bottom: (1) .fungi authoring with flow and contract blocks; (2) the Stage-A compiler lexer, parser, type/effect/value-state checkers, K3 governance verifier and GIR emitter; (3) compile targets WASM/bytecode/native plus Stage-B self-hosting at byte parity; (4) the application framework — scaffolder, deny-by-default fuse border of three gates, App Kernel admission, Capability Host and governed HTTP transport; (5) the low-level substrate — Tri-Pipe Binary/Hybrid/Photonic, tower-citizen, DRCM containment as a Stage-A simulation, and governance sentinels; and (6) a cross-cutting crypto-on-core invariant with K3 fail-closed and ProofGraph audit running down the right side. Aspirational items (real DSS.wasm, photonic silicon, in-sandbox isolation) are marked honestly.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="24" y="26" font-size="16" font-weight="700" fill="#1c2128">Galerina — the whole stack, authoring to substrate</text>
<text x="24" y="44" font-size="11" fill="#5a6470">blue = compile-time · teal = runtime · amber = framework / governed-ext · purple = cross-cutting invariant · red = fail-closed · dashed = aspirational</text>

<!-- Right-side cross-cutting invariant band (drawn first, behind) -->
<rect x="612" y="58" width="92" height="588" rx="8" fill="#f3eefa" stroke="#7c5cd0" stroke-width="1.5" stroke-dasharray="2 0"/>
<text x="658" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#3f2d73">Cross-cutting</text>
<text x="658" y="96" text-anchor="middle" font-size="10.5" fill="#3f2d73">invariant</text>
<line x1="624" y1="108" x2="692" y2="108" stroke="#7c5cd0" stroke-width="1" stroke-dasharray="3 3"/>
<text x="658" y="132" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3f2d73">crypto-on-core</text>
<text x="658" y="147" text-anchor="middle" font-size="9.5" fill="#52407e">digital, bit-exact</text>
<text x="658" y="162" text-anchor="middle" font-size="9.5" fill="#52407e">Ed25519 +</text>
<text x="658" y="176" text-anchor="middle" font-size="9.5" fill="#52407e">ML-DSA-65</text>
<line x1="624" y1="192" x2="692" y2="192" stroke="#7c5cd0" stroke-width="1" stroke-dasharray="3 3"/>
<text x="658" y="216" text-anchor="middle" font-size="10.5" font-weight="600" fill="#c0392b">K3 fail-closed</text>
<text x="658" y="231" text-anchor="middle" font-size="9.5" fill="#52407e">vAnd Kleene</text>
<text x="658" y="245" text-anchor="middle" font-size="9.5" fill="#52407e">0 unknown</text>
<text x="658" y="259" text-anchor="middle" font-size="9.5" fill="#52407e">→ deny</text>
<line x1="624" y1="275" x2="692" y2="275" stroke="#7c5cd0" stroke-width="1" stroke-dasharray="3 3"/>
<text x="658" y="300" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3f2d73">ProofGraph</text>
<text x="658" y="315" text-anchor="middle" font-size="9.5" fill="#52407e">+ .lmanifest</text>
<text x="658" y="329" text-anchor="middle" font-size="9.5" fill="#52407e">CBOR audit</text>
<text x="658" y="343" text-anchor="middle" font-size="9.5" fill="#52407e">Tag 410</text>
<line x1="624" y1="359" x2="692" y2="359" stroke="#7c5cd0" stroke-width="1" stroke-dasharray="3 3"/>
<text x="658" y="384" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3f2d73">Monotonic</text>
<text x="658" y="399" text-anchor="middle" font-size="9.5" fill="#52407e">authority only</text>
<text x="658" y="413" text-anchor="middle" font-size="9.5" fill="#52407e">shrinks, never</text>
<text x="658" y="427" text-anchor="middle" font-size="9.5" fill="#52407e">expands</text>
<line x1="624" y1="443" x2="692" y2="443" stroke="#7c5cd0" stroke-width="1" stroke-dasharray="3 3"/>
<text x="658" y="468" text-anchor="middle" font-size="10.5" font-weight="600" fill="#3f2d73">Zero-trust</text>
<text x="658" y="483" text-anchor="middle" font-size="9.5" fill="#52407e">not dev,</text>
<text x="658" y="497" text-anchor="middle" font-size="9.5" fill="#52407e">net, or host</text>
<text x="658" y="511" text-anchor="middle" font-size="9.5" fill="#52407e">OS kernel</text>
<text x="658" y="636" text-anchor="middle" font-size="9" font-style="italic" fill="#7c5cd0">applies to all bands</text>

