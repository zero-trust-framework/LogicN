<text x="24" y="76" font-size="11" font-weight="600" fill="#5a6470">① Authoring — .fungi source</text>
<rect x="24" y="82" width="572" height="58" rx="8" fill="#e8effb" stroke="#3b6fd4" stroke-width="1.5"/>
<text x="40" y="104" font-size="13" font-weight="600" fill="#1f3a6b">flow + contract { … }</text>
<text x="40" y="122" font-size="10.5" fill="#1f3a6b">intent · effects · authority/capabilities · access · privacy · invariant · policy{} overlay</text>
<text x="40" y="135" font-size="10" fill="#3a5285">pure / secure / governed flows · deny-by-default · Result&lt;T,E&gt;, no silent failure</text>
<path d="M310 140 L310 156" stroke="#8a94a3" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

