family: LLN-NAME
description: "Symbol resolution diagnostics"
diagnostics:
  - code: LLN-NAME-001
    name: UndeclaredName
    severity: error
    phase: symbol_resolver
    message: "'{name}' is not declared in the current scope."
    implemented: true
  - code: LLN-NAME-002
    name: DuplicateName
    severity: error
    phase: symbol_resolver
    message: "'{name}' is already declared in this scope."
    implemented: true
  - code: LLN-NAME-003
    name: UseBeforeDeclaration
    severity: error
    phase: symbol_resolver
    message: "'{name}' is used before it is declared."
    implemented: false
    phase_target: "8B"
  - code: LLN-NAME-004
    name: PrivateAccess
    severity: error
    phase: symbol_resolver
    message: "'{name}' is not exported from its defining module."
    implemented: false
    phase_target: "Phase 9 (module system)"
  - code: LLN-NAME-005
    name: AmbiguousName
    severity: error
    phase: symbol_resolver
    message: "'{name}' resolves to multiple candidates."
    implemented: false
    phase_target: "Phase 9 (module system)"
