family: LLN-MATCH
description: "Match exhaustiveness diagnostics"
diagnostics:
  - code: LLN-MATCH-001
    name: NON_EXHAUSTIVE_MATCH
    severity: error
    phase: type_checker
    message: "match is missing case(s): {missingCases}."
    note: "Alias of LLN-TYPE-021"
    implemented: true
  - code: LLN-MATCH-002
    name: UNREACHABLE_PATTERN
    severity: error
    phase: type_checker
    message: "Pattern is unreachable."
    note: "Alias of LLN-TYPE-022"
    implemented: true
  - code: LLN-MATCH-003
    name: INVALID_PATTERN_TYPE
    severity: error
    phase: type_checker
    message: "Pattern '{pattern}' cannot match against type '{type}'."
    implemented: false
    phase_target: "8B"
