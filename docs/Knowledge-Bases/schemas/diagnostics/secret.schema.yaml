family: FUNGI-SECRET
description: "Secret and SecureString diagnostics"
diagnostics:
  - code: FUNGI-SECRET-001
    name: SecretValueLogged
    severity: error
    phase: value_state_checker
    message: "SecureString binding '{name}' must not be passed to '{callName}'."
    suggestedFix: "Use redact({name}) to produce a safe log placeholder."
    implemented: true
  - code: FUNGI-SECRET-002
    name: SecretComparisonDenied
    severity: error
    phase: value_state_checker
    message: "SecureString binding '{name}' must not be compared with == / !=."
    suggestedFix: "Use constantTimeEquals({name}, other) instead."
    implemented: true
  - code: FUNGI-SECRET-003
    name: SecretSerializationDenied
    severity: error
    phase: value_state_checker
    message: "SecureString binding '{name}' must not be serialized via '{callName}'."
    suggestedFix: "Use redact({name}) before serialization."
    implemented: true
