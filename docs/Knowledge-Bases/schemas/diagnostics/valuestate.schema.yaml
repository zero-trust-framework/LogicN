family: FUNGI-VALUESTATE
description: "Value-state checker diagnostics"
canonical_source: "docs/Knowledge-Bases/value-state-annotations.md"
diagnostics:
  - code: FUNGI-VALUESTATE-001
    name: UnsafeToSafeTransitionDenied
    severity: error
    phase: value_state_checker
    message: "'safe mut {name}' requires a recognised gate function on the right-hand side."
    implemented: true
  - code: FUNGI-VALUESTATE-002
    name: UnvalidatedValueUsed
    severity: warning
    phase: value_state_checker
    message: "Unsafe binding '{name}' passed to '{callName}' without validation."
    implemented: false
    phase_target: "8B"
  - code: FUNGI-VALUESTATE-003
    name: UnsafeValueReachedGovernedSink
    severity: error
    phase: value_state_checker
    message: "Unsafe binding '{name}' cannot flow into governed sink '{sinkName}'."
    implemented: true
  - code: FUNGI-VALUESTATE-004
    name: TaintedValuePropagation
    severity: error
    phase: value_state_checker
    message: "Expression flowing into '{sinkName}' contains an unsafe binding."
    implemented: false
    phase_target: "8B"
  - code: FUNGI-VALUESTATE-005
    name: InvalidValueStateTransition
    severity: error
    phase: value_state_checker
    message: "'safe mut {name}' is not a valid transition — '{name}' was not declared with 'unsafe let'."
    implemented: false
    phase_target: "8B"
