family: FUNGI-SYNTAX
description: "Syntax rule violation diagnostics"
diagnostics:
  - code: FUNGI-SYNTAX-001
    name: VAR_NOT_SUPPORTED
    severity: error
    phase: scanner
    message: "Galerina does not support 'var'. Use 'let' or 'mut'."
    implemented: true
  - code: FUNGI-SYNTAX-002
    name: CONST_NOT_SUPPORTED
    severity: error
    phase: scanner
    message: "Galerina does not support 'const'. Use 'let' or 'readonly'."
    implemented: true
  - code: FUNGI-SYNTAX-003
    name: FUTURE_RESERVED_KEYWORD
    severity: error
    phase: lexer
    message: "'{keyword}' is reserved for future use and cannot be used as an identifier."
    implemented: true
  - code: FUNGI-SYNTAX-004
    name: ACTIVE_KEYWORD_AS_IDENT
    severity: error
    phase: lexer
    message: "'{keyword}' is an active keyword and cannot be used as an identifier."
    implemented: true
  - code: FUNGI-SYNTAX-005
    name: FN_AT_TOP_LEVEL
    severity: error
    phase: parser
    message: "Top-level fn declarations are not permitted. Use pure flow, guarded flow, or secure flow."
    implemented: true
