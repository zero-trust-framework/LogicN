# Galerina — Canonical Term Alias Registry
# Machine-readable glossary for AI tools, IDE tooling, and search indexers.
#
# Purpose:
#   Resolves any alias or alternate spelling to the canonical Galerina term.
#   AI code generators and doc searchers should load this file to normalise
#   terminology before looking up rules.
#
# Schema per entry:
#   canonical:               The one true name used in specs, diagnostics, and compiler
#   aliases:                 Every alternate name found in KB docs, user messages, or older specs
#   category:                type_system | value_state | execution_model | ast | diagnostics | architecture
#   definition:              Single-sentence definition (no jargon)
#   doc:                     Path to the authoritative KB document (relative to docs/Knowledge-Bases/)
#   not_to_be_confused_with: Another term that sounds similar but means something different
#   phase:                   Which compiler phase owns this concept (optional)
#   examples:                Short code snippets (optional)

schema_version: "1.0"
updated: "2026-05-28"

terms:

  # ── Execution model ──────────────────────────────────────────────────────────

  - canonical: "fn"
    aliases:
      - "function"
      - "helper function"
      - "pure function"
      - "local function"
      - "reusable function"
    category: execution_model
    definition: >
      A reusable computation unit. Returns a value and may declare effects it needs.
      No declared effects means pure/locally-bounded computation.
      fn does not carry permissions, policies, or audit rules — those belong in flow.
    doc: "flow-vs-fn-security-model.md"
    not_to_be_confused_with: "flow (governed execution logic)"
    examples:
      - "fn add(a: Int, b: Int) -> Int { return a + b }"
      - "fn calculateTotal(order: Order) -> Money { return order.items.sum(i => i.price) }"

  - canonical: "flow"
    aliases:
      - "governed flow"
      - "governed function"
      - "workflow"
      - "operation"
      - "action"
      - "handler"
    category: execution_model
    definition: >
      Governed execution logic. The unit the runtime plans, audits, boundary-checks,
      and places. Declares permissions, effects, and policies. Sits between routes
      and fn helpers. Ordinary code becomes part of a governed execution plan inside a flow.
    doc: "flow-vs-fn-security-model.md"
    not_to_be_confused_with: "fn (plain computation), route (external entry point)"
    examples:
      - "flow createOrder(request: CreateOrderRequest) -> Result<OrderResponse, ApiError> effects [database.write] { ... }"

  - canonical: "secure flow"
    aliases:
      - "secureFlowDecl"
      - "secured flow"
      - "guarded flow"
      - "security flow"
    category: execution_model
    definition: >
      A flow that handles security-sensitive operations. Enforces stricter value-state
      rules: unsafe bindings must be gate-upgraded before reaching governed sinks.
    doc: "flow-vs-fn-security-model.md"
    not_to_be_confused_with: "pure flow (side-effect-free flow)"

  - canonical: "pure flow"
    aliases:
      - "pureFlowDecl"
      - "pure function flow"
      - "deterministic flow"
    category: execution_model
    definition: >
      A flow that declares no side effects. The compiler enforces that no effectful
      operations occur inside it. Suitable for mathematical or transformation logic
      that must be auditably side-effect-free.
    doc: "flow-vs-fn-security-model.md"

  - canonical: "route"
    aliases:
      - "endpoint"
      - "HTTP route"
      - "API route"
      - "entry point"
      - "external entry point"
    category: execution_model
    definition: >
      An external entry point that exposes a flow to callers (HTTP, webhook, etc.).
      A route delegates to a flow — it does not contain logic itself.
      Relationship: route -> flow -> fn.
    doc: "galerina-api-boundary-architecture.md"
    not_to_be_confused_with: "flow (the logic a route delegates to)"
    examples:
      - "route POST \"/orders\" { request CreateOrderRequest response OrderResponse flow createOrder }"

  - canonical: "effect"
    aliases:
      - "side effect"
      - "capability"
      - "authority"
      - "permission effect"
      - "runtime authority"
    category: execution_model
    definition: >
      A declared runtime authority that a fn or flow requires. Effects are explicit
      and propagate upward: if a flow calls a fn with effect network, the flow must
      also declare or be permitted for that effect. No declared effects = pure/local.
    doc: "effect-checker-and-boundary-checker.md"
    phase: "effect-checker"
    examples:
      - "effects [database.write, audit.write]"
      - "effect network"

  - canonical: "effects clause"
    aliases:
      - "effects declaration"
      - "effect annotation"
      - "effects block"
      - "effectsDecl"
      - "effects list"
    category: execution_model
    definition: >
      The `effects [...]` syntax in a flow or fn header that declares the runtime
      authorities the declaration requires.
    doc: "effect-checker-and-boundary-checker.md"
    examples:
      - "effects [database.read, network.outbound]"

  # ── Type system ──────────────────────────────────────────────────────────────

  - canonical: "Tri"
    aliases:
      - "tristate"
      - "tri-decision"
      - "TriState"
      - "three-valued logic"
      - "tri logic"
      - "three-state"
      - "tri type"
      - "Tri type"
    category: type_system
    definition: >
      Galerina's three-valued truth type with values True, False, and Unknown.
      Not Bool. Cannot be used directly as a branch condition — must be matched
      over all three values. Logical operators (&&, ||, !) are denied on Tri in v1.
    doc: "galerina-core-logic-tri-decision-bool.md"
    not_to_be_confused_with: "trie (prefix-tree data structure, unrelated)"
    examples:
      - "match decision { True => allow() False => deny() Unknown => review() }"

  - canonical: "Bool"
    aliases:
      - "boolean"
      - "Boolean"
      - "bool"
    category: type_system
    definition: >
      Standard two-valued boolean type: true or false. The only type allowed as a
      branch condition in if/while. Distinct from Tri (three-valued).
    doc: "formal-type-system-spec.md"
    not_to_be_confused_with: "Tri (three-valued logic)"

  - canonical: "Auto"
    aliases:
      - "auto"
      - "type inference"
      - "inferred type"
      - "auto type"
      - "type auto"
    category: type_system
    definition: >
      Compile-time inference marker. Tells the compiler to resolve the concrete type
      from the initializer. Not a type itself — never emits FUNGI-TYPE-001. Deferred
      to the inference pass.
    doc: "auto-type-inference.md"
    not_to_be_confused_with: "Any (unsafe dynamic type, not in Galerina v1)"
    examples:
      - "let count: Auto = 42  // inferred as Int"

  - canonical: "Brand<T, Name>"
    aliases:
      - "branded type"
      - "nominal type"
      - "domain type"
      - "opaque type"
      - "newtype"
      - "type brand"
      - "strong typedef"
    category: type_system
    definition: >
      A compile-time type that wraps a base type (e.g. String) with a distinct
      identity (e.g. CustomerId). Prevents mixing structurally identical but
      semantically different values. Erases to the base type at runtime.
    doc: "generic-types.md"
    not_to_be_confused_with: "type alias (same type, different name only)"
    examples:
      - "type CustomerId = Brand<String, \"CustomerId\">"
      - "type OrderId    = Brand<String, \"OrderId\">"

  - canonical: "SecureString"
    aliases:
      - "secret string"
      - "sensitive string"
      - "protected string"
      - "secret value"
      - "ProtectedSecret"
    category: type_system
    definition: >
      A string type for sensitive values (API keys, tokens, passwords). Restricted:
      cannot be compared with ==, passed to log functions, or serialized to plain
      String. Redacted automatically in all diagnostic output.
    doc: "galerina-core-security-secret-reference-model.md"
    not_to_be_confused_with: "String (plain text, no security restrictions)"
    examples:
      - "let apiKey: SecureString = env.secret(\"API_KEY\")"

  - canonical: "Money<C>"
    aliases:
      - "monetary type"
      - "currency type"
      - "Money type"
      - "financial amount"
    category: type_system
    definition: >
      Monetary amount parameterised by currency tag (GBP, USD, EUR, JPY).
      Arithmetic is only allowed between same-currency values.
      Cross-currency arithmetic is FUNGI-TYPE-004.
    doc: "formal-type-system-spec.md"
    examples:
      - "let price: Money<GBP> = Money.of(1999, GBP)"

  - canonical: "Option<T>"
    aliases:
      - "optional"
      - "Maybe"
      - "nullable"
      - "optional value"
      - "Some/None"
    category: type_system
    definition: >
      Represents the presence (Some(T)) or absence (None) of a value.
      The only way to express optional values in Galerina. null and undefined
      do not exist in the language.
    doc: "formal-type-system-spec.md"
    not_to_be_confused_with: "null (not in Galerina), undefined (not in Galerina)"

  - canonical: "Result<T, E>"
    aliases:
      - "Ok/Err"
      - "Result type"
      - "error result"
      - "fallible result"
      - "Either"
    category: type_system
    definition: >
      Represents success (Ok(T)) or typed failure (Err(E)). Replaces exceptions.
      Unhandled Result values produce a compiler warning. Arity 2.
    doc: "formal-type-system-spec.md"

  - canonical: "Tensor<T, Shape>"
    aliases:
      - "tensor"
      - "Tensor"
      - "bare Tensor"
      - "typed tensor"
      - "neural tensor"
      - "compute tensor"
    category: type_system
    definition: >
      Multi-dimensional numeric array parameterised by element type and shape.
      Arity 2: Tensor<ElementType, Shape>. Bare Tensor without parameters is
      invalid (FUNGI-TYPE-009). Use AnyTensor for fully erased form.
    doc: "galerina-tensor-arity-decision.md"
    not_to_be_confused_with: "AnyTensor (erased form), Matrix (fixed 2D)"
    examples:
      - "Tensor<Float32, [Batch, 768]>"
      - "Tensor<Int8, [OutFeatures, InFeatures]>"

  - canonical: "AnyTensor"
    aliases:
      - "erased tensor"
      - "opaque tensor"
      - "dynamic tensor"
      - "untyped tensor"
    category: type_system
    definition: >
      Fully type-erased tensor value where both element type and shape are unknown
      at compile time. Zero-arity. Use when a tensor must be passed without known
      shape or element type — prefer Tensor<T, Shape> wherever possible.
    doc: "galerina-tensor-arity-decision.md"
    not_to_be_confused_with: "Tensor<T, Shape> (typed form)"

  - canonical: "Byte"
    aliases:
      - "byte"
      - "raw byte"
      - "UInt8 byte"
      - "octet"
    category: type_system
    definition: >
      Single unsigned 8-bit raw value. For binary data — not text. Range 0–255.
      Distinct from Char (which is a Unicode character unit, not a number).
    doc: "galerina-core-standard-types-string-char-byte.md"
    not_to_be_confused_with: "Char (Unicode character unit), UInt8 (numeric context)"

  - canonical: "Char"
    aliases:
      - "character"
      - "char"
      - "Unicode char"
      - "character unit"
    category: type_system
    definition: >
      A single Unicode scalar value. Text, not a number. Cannot be assigned to
      Byte without explicit encoding. Use .codePoint() to get the numeric value.
    doc: "galerina-core-standard-types-string-char-byte.md"
    not_to_be_confused_with: "Byte (raw 8-bit value)"

  # ── Value-state ──────────────────────────────────────────────────────────────

  - canonical: "unsafe let"
    aliases:
      - "unsafe binding"
      - "boundary-origin value"
      - "unvalidated value"
      - "tainted value"
      - "untrusted binding"
      - "raw input binding"
    category: value_state
    definition: >
      A binding declaration that marks a value as boundary-origin or untrusted.
      Cannot flow to governed sinks without a gate upgrade (safe mut).
      Syntax: unsafe let name: Type = expr
    doc: "value-state-annotations.md"
    phase: "value-state-checker"
    examples:
      - "unsafe let rawEmail: String = form.email"

  - canonical: "safe mut"
    aliases:
      - "gate upgrade"
      - "safe upgrade"
      - "trust upgrade"
      - "validation upgrade"
      - "state upgrade"
      - "trust transition"
    category: value_state
    definition: >
      Upgrades an unsafe binding to safe state by applying a recognised gate
      function on the right-hand side. The gate must be from the approved registry
      (validate.*, sanitize.*, json.decode, parse.*). Emits FUNGI-VALUESTATE-001
      if the RHS is not a recognised gate.
    doc: "value-state-annotations.md"
    phase: "value-state-checker"
    examples:
      - "safe mut rawEmail = validate.email(rawEmail)?"
      - "safe mut rawBody  = json.decode<CreateOrderRequest>(rawBody)?"

  - canonical: "governed sink"
    aliases:
      - "sink"
      - "write sink"
      - "trusted sink"
      - "secured sink"
      - "database sink"
      - "governed write target"
      - "protected sink"
    category: value_state
    definition: >
      A call target that must not receive unsafe binding arguments.
      Includes database write operations (*DB.insert/update/delete/write),
      AuditLog.write, shell.exec, and FileSystem.write.
      Registry: docs/Knowledge-Bases/stdlib-gates.yaml §sinks
    doc: "stdlib-gates.yaml"
    phase: "value-state-checker"

  - canonical: "gate function"
    aliases:
      - "gate"
      - "validator"
      - "sanitizer"
      - "validation gate"
      - "trust gate"
      - "safe function"
      - "approved gate"
    category: value_state
    definition: >
      A function recognised by the compiler as a valid unsafe→safe transition.
      Must appear on the RHS of a safe mut statement. Approved prefixes:
      validate.*, sanitize.*, json.decode, toml.decode, parse.*, redact, constantTimeEquals.
      Registry: docs/Knowledge-Bases/stdlib-gates.yaml §gates
    doc: "stdlib-gates.yaml"
    phase: "value-state-checker"

  - canonical: "redact"
    aliases:
      - "redaction"
      - "masking"
      - "secret masking"
      - "log-safe value"
    category: value_state
    definition: >
      Produces a log-safe placeholder from a sensitive or unsafe value.
      Required before passing SecureString or protected values to log functions.
      Does not declassify the original value.
    doc: "stdlib-gates.yaml"
    examples:
      - "log.info(redact(apiKey))"

  - canonical: "constantTimeEquals"
    aliases:
      - "constant time comparison"
      - "timing-safe equals"
      - "secure equals"
      - "secret equals"
    category: value_state
    definition: >
      Timing-safe equality check for secret/protected values. Required instead
      of == for SecureString comparisons. Direct == on SecureString emits
      FUNGI-SECRET-002.
    doc: "stdlib-gates.yaml"
    examples:
      - "let valid: Bool = constantTimeEquals(expected, provided)"

  # ── Diagnostics ──────────────────────────────────────────────────────────────

  - canonical: "FUNGI-TYPE-001"
    aliases:
      - "UnknownType"
      - "unknown type error"
      - "type not found"
      - "undefined type"
    category: diagnostics
    definition: >
      Emitted when a type reference cannot be resolved to any built-in type,
      user-defined type, or enum in scope. Includes fuzzy suggestions when a
      close match exists. Not emitted for Auto (inference marker).
    doc: "formal-type-system-spec.md"
    phase: "type-checker"

  - canonical: "FUNGI-TYPE-009"
    aliases:
      - "InvalidGenericInstantiation"
      - "arity mismatch"
      - "generic arity error"
      - "wrong type arguments"
      - "wrong number of type parameters"
    category: diagnostics
    definition: >
      Emitted when a generic type is instantiated with the wrong number of type
      arguments. Example: Option<String, Error> (Option expects 1), bare Tensor
      (Tensor expects 2).
    doc: "formal-type-system-spec.md"
    phase: "type-checker"

  - canonical: "FUNGI-VALUESTATE-001"
    aliases:
      - "UnsafeToSafeTransitionDenied"
      - "missing gate"
      - "gate missing"
      - "safe mut without gate"
    category: diagnostics
    definition: >
      Emitted when a safe mut declaration does not use a recognised gate function
      on the right-hand side.
    doc: "value-state-annotations.md"
    phase: "value-state-checker"

  - canonical: "FUNGI-VALUESTATE-003"
    aliases:
      - "UnsafeValueReachedGovernedSink"
      - "unsafe at sink"
      - "unsafe value in sink"
      - "tainted value at sink"
    category: diagnostics
    definition: >
      Emitted when an unsafe binding is passed as an argument to a governed sink
      without first being gate-upgraded with safe mut.
    doc: "value-state-annotations.md"
    phase: "value-state-checker"

  - canonical: "FUNGI-SECRET-001"
    aliases:
      - "SecretValueLogged"
      - "secret in log"
      - "SecureString logged"
    category: diagnostics
    definition: >
      Emitted when a SecureString binding is passed to a log function (print,
      log.*, Logger.*, console.*). Use redact() to produce a safe placeholder.
    doc: "value-state-annotations.md"
    phase: "value-state-checker"

  - canonical: "FUNGI-SECRET-002"
    aliases:
      - "SecretComparisonDenied"
      - "secret equality"
      - "SecureString equals"
      - "direct secret comparison"
    category: diagnostics
    definition: >
      Emitted when a SecureString binding is compared with == or !=.
      Use constantTimeEquals() instead.
    doc: "value-state-annotations.md"
    phase: "value-state-checker"

  - canonical: "FUNGI-TYPE-004"
    aliases:
      - "InvalidBinaryOperation"
      - "invalid operator"
      - "operator type mismatch"
      - "bad operand types"
      - "operator not defined"
    category: diagnostics
    definition: >
      Emitted when a binary operator is applied to operand types that do not
      support it. Example: Int + String, Money<GBP> + Money<USD>, Tri as branch
      condition, String < String.
    doc: "operator-type-rules.md"
    phase: "type-checker (Phase 7B)"

  - canonical: "FUNGI-MATCH-001"
    aliases:
      - "NonExhaustiveMatch"
      - "non-exhaustive match"
      - "missing match arm"
      - "incomplete match"
      - "match not exhaustive"
    category: diagnostics
    definition: >
      Emitted when a match expression does not handle all variants of the
      scrutinee type. All Option, Result, and enum variants must be covered
      unless a wildcard _ arm is present.
    doc: "formal-type-system-spec.md"
    phase: "type-checker (Phase 7B)"

  - canonical: "FUNGI-NAME-001"
    aliases:
      - "UNDECLARED_NAME"
      - "undefined name"
      - "name not found"
      - "identifier not declared"
    category: diagnostics
    definition: >
      Emitted when an identifier is referenced that was not declared in any
      enclosing scope. Produced by the symbol resolver pass.
    doc: "formal-type-system-spec.md"
    phase: "symbol-resolver (Phase 7A)"

  # ── AST ──────────────────────────────────────────────────────────────────────

  - canonical: "AstNodeKind"
    aliases:
      - "node kind"
      - "AST kind"
      - "node type"
      - "AST node type"
      - "kind discriminant"
    category: ast
    definition: >
      The discriminant string field on every AstNode that identifies what the
      node represents. The complete union is defined in parser.ts.
      See ast-value-encoding.md for what .value means per kind.
    doc: "ast-value-encoding.md"

  - canonical: "letDecl"
    aliases:
      - "let declaration"
      - "let binding"
      - "immutable binding"
      - "let statement"
    category: ast
    definition: >
      AST node kind for `let` and `unsafe let` / `safe let` binding declarations.
      .value encodes: "[safetyPrefix ][name][: TypeString]"
    doc: "ast-value-encoding.md"

  - canonical: "mutDecl"
    aliases:
      - "mut declaration"
      - "mutable binding"
      - "mut statement"
      - "safe mut declaration"
    category: ast
    definition: >
      AST node kind for `mut` and `safe mut` binding declarations.
      .value encodes: "[safetyPrefix ][name][: TypeString]"
    doc: "ast-value-encoding.md"

  - canonical: "errorPropagation"
    aliases:
      - "? operator"
      - "error propagation operator"
      - "try operator"
      - "propagation node"
      - "question mark operator"
    category: ast
    definition: >
      AST node kind for the `?` postfix error-propagation operator.
      Wraps a fallible expression and short-circuits on Err.
      children[0] is the inner expression being propagated.
    doc: "ast-value-encoding.md"
    examples:
      - "validate.email(raw)?   // errorPropagation wrapping callExpr"

  - canonical: "computeTargetBlock"
    aliases:
      - "compute target"
      - "compute block"
      - "target block"
      - "hardware target block"
    category: ast
    definition: >
      AST node kind for `compute target cpu|gpu|npu|best { }` blocks.
      .value is the target kind string. Does not carry semantic enforcement
      in Phase 6 — reserved for Phase 7+ compute planning.
    doc: "ast-value-encoding.md"

  # ── Architecture ─────────────────────────────────────────────────────────────

  - canonical: "governed execution"
    aliases:
      - "governed execution plan"
      - "governance"
      - "execution governance"
      - "governed runtime"
      - "governed flow execution"
    category: architecture
    definition: >
      Galerina's core model: code does not execute freely — it executes as part of
      a declared, auditable, permission-controlled plan. Flows are the unit of
      governed execution. The model is: intent -> governed execution plan ->
      coordinated compute.
    doc: "core-application-model.md"

  - canonical: "boundary"
    aliases:
      - "trust boundary"
      - "system boundary"
      - "external boundary"
      - "API boundary"
      - "network boundary"
    category: architecture
    definition: >
      The point where data enters or exits a governed context. Data crossing a
      boundary is treated as unsafe until explicitly validated by a gate function.
      Boundaries include API inputs, file reads, network responses, and environment variables.
    doc: "effect-checker-and-boundary-checker.md"

  - canonical: "compute target"
    aliases:
      - "execution target"
      - "hardware target"
      - "compute backend"
      - "target device"
    category: architecture
    definition: >
      The runtime compute resource a block should execute on: cpu, gpu, npu, or
      best (runtime-selected). Declared in compute target { } blocks. Separate
      from tensor type parameters — backend details do not belong in type signatures.
    doc: "galerina-tensor-arity-decision.md"

  - canonical: "intent"
    aliases:
      - "declaration intent"
      - "declared intent"
      - "intent declaration"
      - "intentDecl"
    category: architecture
    definition: >
      A high-level declaration of what a module, flow, or system is intended to do.
      Used by the governance verifier to check that behavior matches declared purpose.
      Declared with the `intent` keyword.
    doc: "core-application-model.md"

  - canonical: "IGO"
    aliases:
      - "Intent-Guided Optimisation"
      - "Intent-Guided Optimization"
      - "GIRT"
      - "Governed Intent-Guided Runtime"
      - "adaptive runtime"
      - "workload learning"
      - "intent-guided"
    category: architecture
    definition: >
      The Galerina runtime architecture where intent declarations guide execution
      optimisation without granting additional authority.
      Intent is a signal for optimisation, not a grant of authority.
      Learned preferences expire (stale_after), are bounded (denied_targets),
      and are auditable (audit_at_confidence).
    doc: "galerina-intent-guided-optimisation.md"
    not_to_be_confused_with: "intent declaration (the source-level `intent` keyword)"
