# Convention / quality gate (#6 — flip the enforcers toward CI-enforcing). Runs the build-free
# `lint-conventions` umbrella (diagnostic-codes · doc-drift · provenance · lint-lln) on every push + PR.
#
# STAGE 1 (now): `--soft` = REPORT-ONLY. It prints the full violation report into the Actions log + the
# step summary but does NOT fail the build, because the baseline is still > 0 (the documented plan:
# drive the scanner baseline → 0, then drop `--soft` to make it enforcing). The pure-node enforcers need
# no build and no `npm install` (they read git-tracked source/docs/artifacts), so this is CI-clean.
# (Full test-suite CI is a separate task — the non-workspace monorepo needs per-package installs.)
name: conventions

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Convention gate (report-only — STAGE 1 of #6)
        run: |
          echo '## Convention / quality gate (lint-conventions --soft)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          node scripts/lint-conventions.mjs --soft | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        # --soft always exits 0: report-only until the baseline reaches 0, then this `--soft` is dropped.

  # A green, build-free, zero-baseline SECURITY invariant — run ENFORCING (no --soft): a literal NUL byte in
  # a source file makes it binary-flagged + invisible to grep/git review (an audit-evasion class). This job
  # FAILS a PR that introduces one. It needs no build/install — the test reads source files directly.
  hygiene-no-nul:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: No NUL bytes in source (enforcing)
        run: node --test packages-logicn/logicn-core-compiler/tests/source-hygiene-no-nul.test.mjs

  # A green, build-free, zero-baseline OPEN-CORE invariant (0056-ci-lint): no NON-Apache license
  # declaration may contaminate the Apache-2.0 package tree (PD-spec↛Apache), and no core package may
  # import an enterprise-tier package (core↛enterprise, via governance/tier-manifest.json). The lint's
  # --self-test proves both detectors still fire (a neutered lint is itself a fail-open), then the lint
  # runs ENFORCING. FAILS a PR that introduces cross-tier contamination.
  tier-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tier-boundary contamination guard (self-test, then enforcing)
        run: |
          node scripts/audit-tier-boundary.mjs --self-test
          node scripts/audit-tier-boundary.mjs

  # gate-injection (build-free, zero-baseline, ENFORCING): every non-test caller of the admission border
  # (fusePackage / fusePackages / buildImportClosure) must inject the revocation gate (revocationCheck) —
  # a host that fuses without it silently admits a REVOKED signing key (a fail-open no happy-path test
  # catches). version.json mandates this gate "fails CI"; this job makes that true. --self-test proves the
  # detector fires; then the scan runs ENFORCING.
  gate-injection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Admission-border revocation-gate injection guard (self-test, then enforcing)
        run: |
          node scripts/check-gate-injection.mjs --self-test
          node scripts/check-gate-injection.mjs

  # production-blockers (build-free, zero-baseline, ENFORCING): every code in production-check.ts
  # PRODUCTION_BLOCKERS must have a real emitter. A blocker no compiler pass can produce advertises a
  # deployment block it cannot enforce (the false memory-gate: LLN-MEMORY-001/002/003/007 were blockers
  # with no emitter). The --self-test proves the detector fires; then the scan runs ENFORCING.
  production-blockers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Production-blocker emitter guard (self-test, then enforcing)
        run: |
          node scripts/audit-production-blockers.mjs --self-test
          node scripts/audit-production-blockers.mjs

  # name-collisions (build-free, zero-baseline, ENFORCING): no two package names may be reordered-token
  # near-anagrams (the graph-project / project-graph tangle) or typo-twins. The --self-test proves the
  # detectors fire; then the scan runs ENFORCING against live package.json names + governance/name-registry.json
  # (known collisions allowlisted with a decided resolution). FAILS a PR that introduces a confusing new name.
  name-collisions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Name-collision guard (self-test, then enforcing)
        run: |
          node scripts/audit-name-collisions.mjs --self-test
          node scripts/audit-name-collisions.mjs

  # diagnostic-doc-drift (build-free, zero-baseline, ENFORCING): the canonical diagnostic reference
  # (compiler-diagnostics.md) must not misdescribe a WIRED code. For any LLN-* code that carries a
  # structured name/message in source AND a description in the doc, the two must share at least one
  # meaningful word — zero overlap means the doc is describing a different fault (the LLN-RUNTIME-006
  # "Audit event stream write failed" / really RateLimitExceeded class). The --self-test proves the
  # detector fires; then the scan runs ENFORCING (reads .ts source + the .md doc directly — no build).
  diagnostic-doc-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Diagnostic doc↔source drift (self-test, then enforcing)
        run: |
          node scripts/audit-diagnostic-doc-drift.mjs --self-test
          node scripts/audit-diagnostic-doc-drift.mjs

  # graph-integrity self-test (build-free): the structural-graph detectors (dangling edge / dup id /
  # dependency cycle / stale sourcePath) must keep firing. The FULL audit validates a GENERATED graph
  # (build/graph/*.json is a ~3MB gitignored artifact + the CLI dist is not committed), so it cannot run
  # against a committed graph build-free — it runs locally / pre-commit / in a build-full job. Here we
  # only enforce that the audit's detectors are not silently neutered (a neutered audit is a fail-open).
  graph-integrity-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Graph-integrity detectors self-test (build-free)
        run: node scripts/audit-graph-integrity.mjs --self-test
